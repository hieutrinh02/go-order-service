name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.APP_IMAGE }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Validate production Compose config
        run: APP_ENV_FILE=.env.prod.example docker compose --env-file .env.prod.example -f docker-compose.prod.yml config --quiet
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          IMAGE_SHA="${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"

          echo "image=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.latest }}
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_IMAGE: ${{ needs.build.outputs.image }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR }}
      EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get runner public IP
        id: runner-ip
        run: |
          RUNNER_IP="$(curl -s https://checkip.amazonaws.com)"
          echo "cidr=${RUNNER_IP}/32" >> "$GITHUB_OUTPUT"

      - name: Allow temporary SSH access
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.cidr }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/ec2_key "${EC2_USER}@${EC2_HOST}" << EOF
            set -euo pipefail

            cd "${EC2_PROJECT_DIR}"
            git pull --ff-only origin main

            export APP_IMAGE="${DEPLOY_IMAGE}"
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps

            curl --fail --silent --show-error http://localhost/healthz
            curl --fail --silent --show-error http://localhost/readyz
          EOF

      - name: Revoke temporary SSH access
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.cidr }}" || true