services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${APP_IMAGE:-ghcr.io/hieutrinh02/go-order-service:latest}
    restart: "no"
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    command: ["sh", "-c", "goose -dir /app/migrations postgres \"$DATABASE_URL\" up"]
    depends_on:
      postgres:
        condition: service_healthy

  api_1: &api_service
    image: ${APP_IMAGE:-ghcr.io/hieutrinh02/go-order-service:latest}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api_2:
    <<: *api_service

  publisher:
    image: ${APP_IMAGE:-ghcr.io/hieutrinh02/go-order-service:latest}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    command: ["/app/publisher"]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  consumer:
    image: ${APP_IMAGE:-ghcr.io/hieutrinh02/go-order-service:latest}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    command: ["/app/consumer"]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api_1
      - api_2
      - publisher
      - consumer

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${FE_DIST_DIR:-/home/ubuntu/go-order-service-fe/dist}:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      api_1:
        condition: service_started
      api_2:
        condition: service_started

  certbot:
    image: certbot/certbot:v2.11.0
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_www:
  certbot_certs:
