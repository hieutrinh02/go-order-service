events {}

http {
    upstream api_upstream {
        server api_1:8080;
        server api_2:8080;
    }

    server {
        listen 80;
        server_name go-order-service.hieutrinh02.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name go-order-service.hieutrinh02.dev;

        ssl_certificate /etc/letsencrypt/live/go-order-service.hieutrinh02.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/go-order-service.hieutrinh02.dev/privkey.pem;

        location / {
            proxy_pass http://api_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}